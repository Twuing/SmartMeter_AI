name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev libssl-dev git zip unzip \
            python3-dev autoconf automake libtool pkg-config libltdl-dev cmake
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer

      - name: Accept Android Licenses
        run: |
          # Используем прямой путь к sdkmanager в окружении GitHub
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Build with Buildozer
        run: |
          # Запуск сборки
          buildozer -v android debug
        env:
          BUILDOZER_ALLOW_KIVY_ROOT: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-meter-apk
          path: bin/*.apk
